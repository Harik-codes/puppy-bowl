<!doctype html>
<html lang="en">
  <head>
    <title>Puppy Bowl</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div id="app">
      <div>
        <div id="puppySelect"></div>
        <div>
          <h4>Invite a Puppy</h4>
          <form id="dform">
            <lable>
              NAME:
              <br />
              <input type="text" name="dname" />
            </lable>
            <br />
            <lable>
              Breed:
              <br />
              <input type="text" name="dbreed" />
            </lable>
            <br />
            <lable
              >Status:
              <br />
              <input type="text" name="dstatus" />
            </lable>
            <br />
            <lable
              >ImageURL:
              <br />
              <input type="text" name="dimageurl" />
            </lable>
            <br />
            <button id="dbutton" type="submit">Invite Puppy</button>
          </form>
        </div>
      </div>
      <div id="puppyStatus"></div>
    </div>
  </body>
</html>
